name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-apple-silicon:
    name: Build macOS (Apple Silicon)
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Collect DMG asset
        run: |
          mkdir -p release-assets
          dmg_path=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" -type f | head -n 1)
          if [ -z "$dmg_path" ]; then
            echo "DMG file not found"
            exit 1
          fi
          cp "$dmg_path" release-assets/XClaw-macOS-Apple-Silicon.dmg

      - name: Publish macOS release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: XClaw ${{ github.ref_name }}
          body: |
            ## 更新内容
            - 本版本已完成构建并提供 macOS 与 Windows 安装包。
            - 如需补充更详细的功能更新、修复说明和已知问题，可在 GitHub Release 页面手动编辑本说明。

            ## 安装说明
            - `XClaw-macOS-Apple-Silicon.dmg`：适用于 Apple Silicon（M1 / M2 / M3 / M4）
            - `XClaw-Windows-x64-setup.exe`：适用于 Windows x64

            ## Intel 版本
            - Intel Mac 安装包不再默认随每次发版自动生成。
            - 如有需要，可单独手动触发 Intel 构建流程。

            ## 说明
            - macOS 首次安装如遇到系统安全提示，请在系统设置中允许打开应用。
            - Windows 内部测试版本当前未启用正式代码签名，首次安装可能看到系统安全提示。
          files: release-assets/XClaw-macOS-Apple-Silicon.dmg

  build-windows-x64:
    name: Build Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Import Windows certificate
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            Write-Host "Windows certificate secrets not configured. Skipping certificate import."
            exit 0
          }

          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item -LiteralPath certificate/tempCert.txt
          Import-PfxCertificate `
            -FilePath certificate/certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)

      - name: Prepare Windows Tauri config
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_CERTIFICATE_DIGEST_ALGORITHM: ${{ secrets.WINDOWS_CERTIFICATE_DIGEST_ALGORITHM }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          $configPath = "src-tauri/tauri.windows.conf.json"
          $outputPath = "src-tauri/tauri.windows.ci.conf.json"
          $config = Get-Content -Raw $configPath | ConvertFrom-Json

          if (-not $config.bundle.windows) {
            $config.bundle | Add-Member -NotePropertyName windows -NotePropertyValue ([pscustomobject]@{})
          }

          if ($env:WINDOWS_CERTIFICATE_THUMBPRINT -and $env:WINDOWS_CERTIFICATE_DIGEST_ALGORITHM -and $env:WINDOWS_TIMESTAMP_URL) {
            $config.bundle.windows | Add-Member -NotePropertyName certificateThumbprint -NotePropertyValue $env:WINDOWS_CERTIFICATE_THUMBPRINT -Force
            $config.bundle.windows | Add-Member -NotePropertyName digestAlgorithm -NotePropertyValue $env:WINDOWS_CERTIFICATE_DIGEST_ALGORITHM -Force
            $config.bundle.windows | Add-Member -NotePropertyName timestampUrl -NotePropertyValue $env:WINDOWS_TIMESTAMP_URL -Force
            Write-Host "Windows signing is enabled for this build."
          } else {
            Write-Host "Windows signing secrets are incomplete. Building unsigned installer."
          }

          $config | ConvertTo-Json -Depth 10 | Set-Content -Path $outputPath

      - name: Build Tauri app
        run: pnpm tauri build --target x86_64-pc-windows-msvc --config src-tauri/tauri.windows.ci.conf.json

      - name: Collect NSIS installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $installer = Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis" -Filter "*-setup.exe" -Recurse | Select-Object -First 1
          if (-not $installer) {
            Write-Error "NSIS installer not found"
            exit 1
          }
          Copy-Item -LiteralPath $installer.FullName -Destination "release-assets/XClaw-Windows-x64-setup.exe"

      - name: Upload Windows installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/XClaw-Windows-x64-setup.exe
