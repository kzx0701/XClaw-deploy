name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Intel
            runner: macos-13
            target: x86_64-apple-darwin
            artifact_name: xclaw-macos-intel-dmg
            output_name: XClaw-macOS-Intel.dmg
          - name: AppleSilicon
            runner: macos-14
            target: aarch64-apple-darwin
            artifact_name: xclaw-macos-apple-silicon-dmg
            output_name: XClaw-macOS-Apple-Silicon.dmg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: pnpm tauri build --target ${{ matrix.platform.target }}

      - name: Collect DMG asset
        run: |
          mkdir -p release-assets
          dmg_path=$(find src-tauri/target/${{ matrix.platform.target }}/release/bundle/dmg -name "*.dmg" -type f | head -n 1)
          if [ -z "$dmg_path" ]; then
            echo "DMG file not found"
            exit 1
          fi
          cp "$dmg_path" "release-assets/${{ matrix.platform.output_name }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: release-assets/${{ matrix.platform.output_name }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-macos

    steps:
      - name: Download Intel DMG
        uses: actions/download-artifact@v4
        with:
          name: xclaw-macos-intel-dmg
          path: release-assets

      - name: Download Apple Silicon DMG
        uses: actions/download-artifact@v4
        with:
          name: xclaw-macos-apple-silicon-dmg
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: XClaw ${{ github.ref_name }}
          body: |
            ## 更新内容
            - 本版本已完成构建并提供 macOS 安装包。
            - 如需补充更详细的功能更新、修复说明和已知问题，可在 GitHub Release 页面手动编辑本说明。

            ## 安装说明
            - `XClaw-macOS-Apple-Silicon.dmg`：适用于 Apple Silicon（M1 / M2 / M3 / M4）
            - `XClaw-macOS-Intel.dmg`：适用于 Intel Mac

            ## 说明
            - 首次安装如遇到 macOS 安全提示，请在系统设置中允许打开应用。
          files: |
            release-assets/XClaw-macOS-Apple-Silicon.dmg
            release-assets/XClaw-macOS-Intel.dmg
