name: Release Intel DMG

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach Intel assets to, e.g. v1.0.6"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos-intel:
    name: Build macOS (Intel)
    runs-on: macos-13

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: pnpm tauri build --target x86_64-apple-darwin

      - name: Collect DMG asset
        run: |
          mkdir -p release-assets
          dmg_path=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -name "*.dmg" -type f | head -n 1)
          if [ -z "$dmg_path" ]; then
            echo "DMG file not found"
            exit 1
          fi
          cp "$dmg_path" release-assets/XClaw-macOS-Intel.dmg

      - name: Upload Intel DMG to existing release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: release-assets/XClaw-macOS-Intel.dmg
